<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"href="cs.css">
    <title>To Do List</title>
  </head>
  <body class="mt-5 pt-5">
    <div class="card shadow-l mt-5 mx-auto bg-gradient" style="max-width: 800px;border-radius:30px;box-shadow: rgba(0,0,0,0.56) 0px 22px 70px 4px;">
      <h2 class="text-center mt-3">TO DO LIST APP</h2>
      <h5 id="count-task" class="text-center mt-3">Task Count: 0</h5>

      <div class="container mb-5 col-6">
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Enter a task">
          <button id="save-btn" class="btn btn-outline-success bg-success text-black-50" type="button">Add Task</button>
        </div>
        <ul id="ParentList" class="list-group mb-2"></ul>
      </div>
    </div>

<script>
  let newBtn = document.getElementById('save-btn');
  let parentList = document.getElementById('ParentList');
  let taskInput = document.querySelector(".form-control");

  
  taskInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      newBtn.click();
    }
  });

  newBtn.addEventListener('click', addTask);

  
  function updateCount() {
    let items = parentList.querySelectorAll("li");
    document.getElementById("count-task").innerText = "Task Count: " + items.length;
  }

  
  function showEmptyMsg() {
    if (!document.querySelector(".emptyMsg")) {
      let msg = document.createElement("h4");
      msg.classList.add("emptyMsg");
      msg.textContent = "No tasks found.😞";
      msg.style.textAlign = "center";
      msg.style.margin = "50px";
      parentList.appendChild(msg);
    }
  }

  function hideEmptyMsg() {
    let msg = document.querySelector(".emptyMsg");
    if (msg) msg.remove();
  }

  function addTask() {
    let currentTaskName = taskInput.value.trim();

    if (currentTaskName === "") {
      alert("Enter a task");
      return;
    }

    hideEmptyMsg();

    let newLi = document.createElement('li');
    newLi.className = "list-group-item d-flex justify-content-between mb-2";
    newLi.style.borderRadius = "8px";
    newLi.innerHTML = `
      <h4 class="flex-grow-1">${currentTaskName}</h4>
      <button class="btn-warning mx-2" onclick="editTask(this)" style="border-radius:7px;">Edit</button>
      <button class="btn-danger" onclick="removeTask(this)" style="border-radius:7px;">REMOVE</button>
    `;

    parentList.appendChild(newLi);
    taskInput.value = "";
    updateCount();
  }

 
  function removeTask(currElement) {
    if (confirm("Are you sure?")) {
      currElement.parentElement.remove();
      updateCount();

      if (parentList.querySelectorAll("li").length === 0) {
        showEmptyMsg();
      }
    }
  }

  
  function editTask(currElement) {
    if (currElement.textContent === "Done") {
      currElement.textContent = "Edit";
      let currTaskName = currElement.previousElementSibling.value;
      let currHeading = document.createElement('h4');
      currHeading.className = "flex-grow-1";
      currHeading.textContent = currTaskName;
      currElement.parentElement.replaceChild(currHeading, currElement.previousElementSibling);
    } else {
      currElement.textContent = "Done";
      let currentTaskName = currElement.previousElementSibling.textContent;
      let currInput = document.createElement('input');
      currInput.type = "text";
      currInput.placeholder = "Edit Task";
      currInput.className = "form-control";
      currInput.value = currentTaskName;
      currElement.parentElement.replaceChild(currInput, currElement.previousElementSibling);
    }
  }
</script>
  </body>
</html>
