<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>To Do List</title>
  </head>
  <body class=" mt-5 pt-5 px-auto ">
    <div class="card shadow mt-5 mx-auto bg-info  col-5"  style ="max-width:900px;max-height:8000px;border-radius:30px;">
    <h3 class="text-center mt-3 ">TO DO LIST APP</h3>
  

    <div class ="container mb-5 col-6" >
        
        <div class="input-group mb-3 ">
            <input type="text" class="form-control " placeholder="Enter a task" aria-label="Add Task" aria-describedby="button-addon2 "style="border-radius:30px solid black;width:50px;">
            
                <button  id="save-btn"class="btn btn-outline-success  bg-success text-black-50 " type="button" id="button-addon2 ">Add Task</button></ul>
          </div>
          <ul id ="ParentList"class="list-group ">
            <li class="list-group-item  d-flex justify-content-between mb-2" style="border-radius:8px;">
              <h4 class="flex-grow-1 " >walking at night </h4>
                <button  id="edit-btn "class="btn-warning   mx-2" onclick="editTask(this)" style="border-radius:7px ;">Edit</button>
                <button  id="remove-btn" class="btn-danger"  onclick="removeTask(this)" style="border-radius:7px ;">REMOVE</button>
                
               
            </li>
          </ul>
      
    </div>
   
</div>

<script>
    let newBtn =document.getElementById('save-btn')
    newBtn.addEventListener('click',addTask)
    let parentList = document.getElementById('ParentList');

    function addTask (e){
        if(parentList.children[0].className == "emptyMsg"){
            parentList.children[0].remove()
          }
       currentBtn =e.currentTarget
      currentInput = currentBtn.previousElementSibling
      let currentTaskName = currentInput.value
      let newLi =document.createElement('li')
      newLi.className ="list-group-item  d-flex justify-content-between mb-2"
      newLi.style.borderRadius="8px"
      
      

      newLi.innerHTML =`<h4 class="flex-grow-1" >${currentTaskName}</h4>
                <button class="btn-warning mx-2" onclick="editTask(this)" style="border-radius:7px ;">Edit</button>
                <button  class="btn-danger" onclick="removeTask(this)" style="border-radius:7px; ">REMOVE</button>
               
            </li>`
            parentList.appendChild(newLi)




    }
    function removeTask (currElement){
        currElement.parentElement.remove()
        let parentList = document.getElementById('ParentList');
        if( parentList.children.length <=0){
            let newEmptyMsg = document.createElement("h3")
            newEmptyMsg.classList.add("emptyMsg")
            newEmptyMsg.textContent  = "No tasks found.😞Add a task to begin! "
            newEmptyMsg.style.textAlign ="center"
            newEmptyMsg.style.margin ="50px "

            parentList.appendChild(newEmptyMsg)
        }
       
        
    }
    function editTask(currElement){
        if( currElement.textContent =="Done"){
            currElement.textContent = "Edit"
            let currChapterName = currElement.previousElementSibling.value
            let currHeading= document.createElement('h3');
            currHeading.className = "flex-grow-1"
            currHeading.textContent = currChapterName;
            currElement.parentElement.replaceChild(currHeading,currElement.previousElementSibling)

          }else{
        currElement.textContent ="Done" //onclick pa is edit p done ana chahiyai //
        let currentTaskName= currElement.previousElementSibling.textContent
        let currInput= document.createElement('input'); //ik element create kiya ha //
        currInput.type ="text" // os element k undr ik text ana k lia //
        currInput.placeholder ="Add Task"  // ya optional ha yaha ya add kro k option dyta ha //
          currInput.className ="form-control" // ya edit k bd b done k option any p b magin k yhi rahy ga //
          currInput.value = currentTaskName;//ya input m jo b dng gy wao edit m b shoe ho ga 
          currElement.parentElement.replaceChild(currInput,currElement.previousElementSibling)
      
          
    }
}
   

</script>
    







   

   
  </body>
</html>
